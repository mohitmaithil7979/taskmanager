<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Video Downloader</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>Open Video Downloader</h1>
      <p class="note">Click the button on the video itself to download. This popup just helps detect videos.</p>
      <div id="status" class="status">Scanning...</div>
      <div class="actions">
        <button id="rescan">Rescan Page</button>
        <a id="test-link" href="https://www.w3schools.com/html/mov_bbb.mp4" target="_blank" rel="noopener">Open test video</a>
      </div>
      <p class="small">DRM/protected streams will not be downloadable.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
